# temper-git — Temper OS-app manifest.
#
# Consumed by temper-platform's OS-app loader (see
# `crates/temper-platform/src/os_apps/mod.rs`). Temper discovers
# entities by scanning specs/*.ioa.toml, the CSDL at
# specs/model.csdl.xml, and Cedar policies at policies/*.cedar
# automatically — no need to enumerate them here.
#
# Runtime WASM integrations live under wasm/<name>/. Cargo writes build
# output under target/; Temper loads the packaged wasm/<name>/<name>.wasm
# artifact declared by each [[wasm_modules]] stanza.

name = "temper-git"
description = "Temper-native, byte-exact, GitHub-compatible SCM. Byte-exact smart-HTTP git wire + GitHub REST v3 subset, backed by IOA entities and Cedar policies."
version = "0.1.0"
startup_install = "core"

# Default single-operator behavior. Set TEMPER_OS_APP_TEMPER_GIT_MODE=commons
# when installing this OS app into a public commons kernel; the Temper loader
# then includes policies/commons/*.cedar as guardrail overlays.
mode = "operator"

# WASM integrations the app ships. Docker and local release builds compile
# into root target/ and refresh the packaged wasm/<name>/<name>.wasm files.
[[wasm_modules]]
name = "git_upload_pack"
target = "wasm32-wasip1"
criticality = "app-required"
# Eager: compile + cache into WasmEngine at install time so the
# first HttpEndpoint dispatch doesn't race with JIT. Lazy mode
# registers the name→hash mapping only; dispatch then fails with
# "module not found" because the engine's compiled-module cache
# is empty until first explicit invoke.
startup_loading = "eager"

[[wasm_modules]]
name = "git_refs_advertise"
target = "wasm32-wasip1"
criticality = "app-required"
startup_loading = "eager"

[[wasm_modules]]
name = "git_receive_pack"
target = "wasm32-wasip1"
criticality = "app-required"
startup_loading = "eager"

[[wasm_modules]]
name = "scm_ingest_pack"
target = "wasm32-wasip1"
criticality = "app-required"
startup_loading = "eager"

[[wasm_modules]]
name = "app_registry"
target = "wasm32-wasip1"
criticality = "app-required"
startup_loading = "eager"

[[wasm_modules]]
name = "scm_assign_pr_number"
target = "wasm32-wasip1"
criticality = "app-required"
startup_loading = "eager"

[[wasm_modules]]
name = "github_rest_repos"
target = "wasm32-wasip1"
criticality = "app-required"
startup_loading = "eager"

[[wasm_modules]]
name = "github_rest_refs"
target = "wasm32-wasip1"
criticality = "app-required"
startup_loading = "eager"

[[wasm_modules]]
name = "github_rest_pulls"
target = "wasm32-wasip1"
criticality = "app-required"
startup_loading = "eager"
