# PullRequest — a proposal to merge SourceRef into TargetRef.
#
# State machine (mirrors GitHub + adds approval states):
#
#   Draft ─────▶ Open ────────▶ UnderReview ────▶ Approved ─▶ Merged
#                 │    (RequestReview)   │  (Approve)        (Merge)
#                 │                      │
#                 │                      └────▶ ChangesRequested
#                 │                               (RequestChanges)
#                 │                               │
#                 │                               └─(RequestReview)─▶ UnderReview
#                 │
#                 └─(Close)──▶ Closed (terminal; also reachable from all open states)
#
# `Number` is a monotonic per-repo integer — GitHub convention (#n).
# Computed by the `scm_assign_pr_number` WASM integration on Open.
#
# `HeadCommitSha` advances as new commits are pushed to SourceRef;
# `BaseCommitSha` is the merge base at open time (may advance if
# rebase action is implemented in Phase 2).

[automaton]
name = "PullRequest"
states = ["Draft", "Open", "UnderReview", "Approved", "ChangesRequested", "Merged", "Closed"]
initial = "Draft"
allow_indefinite_states = ["Draft", "Open", "UnderReview", "Approved", "ChangesRequested"]

# --- Actions ---

[[action]]
name = "Create"
kind = "input"
from = ["Draft"]
to = "Draft"
params = ["RepositoryId", "SourceRef", "TargetRef", "Title", "Body", "OpenedBy", "ClientRequestId"]
hint = "Draft a PR. Must validate that SourceRef and TargetRef both exist on the repo (cross-invariant)."

[[action]]
name = "Open"
kind = "input"
from = ["Draft"]
to = "Open"
hint = "Transition from Draft to Open. Triggers scm_assign_pr_number to compute the per-repo Number."
effect = [{ type = "trigger", name = "scm_assign_pr_number" }]

[[action]]
name = "AssignNumber"
kind = "input"
from = ["Open"]
to = "Open"
params = ["Number"]
hint = "Backfill the per-repo sequential PR Number. Dispatched by scm_assign_pr_number after Open; a self-loop so the field persists through the governed action path (a raw OData PATCH does not persist on spec-governed entities)."

[[action]]
name = "UpdateHead"
kind = "input"
from = ["Open", "UnderReview", "ChangesRequested", "Approved"]
to = "Open"
params = ["NewHeadCommitSha", "HeadCommitSha"]
hint = "Emitted by receive-pack when a push lands on SourceRef. Resets state to Open (stale review flag is on Approval)."

[[action]]
name = "RequestReview"
kind = "input"
from = ["Open", "ChangesRequested"]
to = "UnderReview"
params = ["ReviewerPrincipal"]

[[action]]
name = "Approve"
kind = "input"
from = ["UnderReview", "ChangesRequested"]
to = "Approved"
params = ["ReviewerPrincipal", "Body"]

[[action]]
name = "RequestChanges"
kind = "input"
from = ["UnderReview", "Approved"]
to = "ChangesRequested"
params = ["ReviewerPrincipal", "Body"]

[[action]]
name = "DismissReview"
kind = "input"
from = ["Approved", "ChangesRequested"]
to = "UnderReview"
params = ["ReviewId", "Reason"]

# The PR-side merge transition. Pure governed state change — no integration,
# no sub-writes. The merge engine (objects + target-ref advance) is owned
# solely by Repository.MergePullRequest (ADR-0024), which applies this action
# as a declared sub-write only after a clean merge. Keeping a trigger here
# would re-enter scm_merge_pr when that sub-write fires, double-merging.
[[action]]
name = "Merge"
kind = "input"
from = ["Approved"]
to = "Merged"
params = ["Strategy", "Message", "ClientRequestId", "MergeCommitSha"]
hint = "Mark the PR merged. Repository.MergePullRequest produces the merge objects and advances TargetRef, then applies this transition as a sub-write."

[[action.cedar_gate]]
principal = "request.principal"
resource = "this"
action = "PullRequest::Merge"

[[action]]
name = "Close"
kind = "input"
from = ["Draft", "Open", "UnderReview", "Approved", "ChangesRequested"]
to = "Closed"
params = ["Reason"]
hint = "Close without merging."

# --- Output events ---

[[action]]
name = "PullRequestOpenedEvent"
kind = "output"

[[action]]
name = "PullRequestMergedEvent"
kind = "output"

[[action]]
name = "PullRequestClosedEvent"
kind = "output"

# --- Safety invariants ---

[[invariant]]
name = "MergedIsFinal"
when = ["Merged"]
assert = "no_further_transitions"

[[invariant]]
name = "ClosedIsFinal"
when = ["Closed"]
assert = "no_further_transitions"

[[integration]]
name = "scm_assign_pr_number"
trigger = "scm_assign_pr_number"
type = "wasm"
module = "scm_assign_pr_number"

[integration.config]
timeout_secs = 5

