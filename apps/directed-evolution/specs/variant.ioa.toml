[automaton]
name = "Variant"
states = ["Created", "Building", "Active", "Eliminated", "Selected", "Promoted", "NotSelected", "Failed"]
initial = "Created"
allow_indefinite_states = ["Created", "Building", "Active", "Selected"]

[[state]]
name = "has_mutation"
type = "bool"
initial = "false"

[[state]]
name = "stage_results"
type = "counter"
initial = "0"

[[action]]
name = "RecordVariantMutation"
kind = "input"
from = ["Created"]
effect = "set has_mutation true"
params = ["EpisodeId", "GenerationId", "MutationId", "AppRef", "BranchRef", "Summary", "ChangedFilesJson", "DiffPatch", "WorkerRunId"]
hint = "Attach the generated mutation and runnable app ref to a variant."

[[action]]
name = "StartVariantBuild"
kind = "input"
from = ["Created"]
to = "Building"
guard = "is_true has_mutation"
params = ["WorkItemId"]
hint = "Start building a variant."

[[action]]
name = "MarkVariantActive"
kind = "input"
from = ["Created", "Building"]
to = "Active"
guard = "is_true has_mutation"
params = ["RuntimeRef", "EvidenceArtifactId"]
hint = "Mark a variant runnable for evaluation and trials."

[[action]]
name = "RecordVariantStageResult"
kind = "input"
from = ["Active"]
effect = "increment stage_results"
params = ["StageResultId"]
hint = "Attach a stage result to the variant."

[[action]]
name = "EliminateVariant"
kind = "input"
from = ["Created", "Building", "Active"]
to = "Eliminated"
params = ["EliminationRuleId", "StageResultId", "EvidenceArtifactId", "Reason"]
hint = "Eliminate a variant with evidence."

[[action]]
name = "SelectVariant"
kind = "input"
from = ["Active"]
to = "Selected"
params = ["SelectionPressureId", "SelectorWorkerRunId", "EvidenceArtifactId", "Reason"]
hint = "Select this variant as the winner."

[[action]]
name = "RecordVariantNotSelected"
kind = "input"
from = ["Active"]
to = "NotSelected"
params = ["SelectionPressureId", "SelectorWorkerRunId", "EvidenceArtifactId", "Reason"]
hint = "Record that a viable surviving variant was considered but not selected as the winner."

[[action]]
name = "PromoteVariant"
kind = "input"
from = ["Selected"]
to = "Promoted"
params = ["PromotionId", "OrganismVersionId"]
hint = "Mark the selected variant as promoted."

[[action]]
name = "FailVariant"
kind = "input"
from = ["Created", "Building", "Active"]
to = "Failed"
params = ["FailureReason", "EvidenceArtifactId"]
hint = "Fail a variant when it cannot continue."
