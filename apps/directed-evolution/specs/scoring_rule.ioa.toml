[automaton]
name = "ScoringRule"
states = ["Draft", "Active", "Archived"]
initial = "Draft"
allow_indefinite_states = ["Draft", "Active"]

[[action]]
name = "ActivateScoringRule"
kind = "input"
from = ["Draft"]
to = "Active"
params = ["EpisodeId", "RuleStatement", "MetricIdsJson", "Weight", "CreatedByWorkerRunId"]
hint = "Activate a soft rule for ranking surviving variants."

[[action]]
name = "ArchiveScoringRule"
kind = "input"
from = ["Draft", "Active"]
to = "Archived"
params = ["Reason"]
hint = "Archive a Scoring Rule."
