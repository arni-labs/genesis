[automaton]
name = "AdaptationGoal"
states = ["Draft", "Active", "Archived"]
initial = "Draft"
allow_indefinite_states = ["Draft", "Active"]

[[action]]
name = "ActivateAdaptationGoal"
kind = "input"
from = ["Draft"]
to = "Active"
params = ["EpisodeId", "GoalStatement", "CreatedByWorkerRunId", "HumanNotes"]
hint = "Activate the episode's Adaptation Goal."

[[action]]
name = "ArchiveAdaptationGoal"
kind = "input"
from = ["Draft", "Active"]
to = "Archived"
params = ["Reason"]
hint = "Archive the Adaptation Goal."
