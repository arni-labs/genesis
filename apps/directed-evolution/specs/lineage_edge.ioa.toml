[automaton]
name = "LineageEdge"
states = ["Recorded", "Archived"]
initial = "Recorded"
allow_indefinite_states = ["Recorded"]

[[action]]
name = "RecordLineageEdge"
kind = "input"
from = ["Recorded"]
params = ["OrganismId", "ParentVersionId", "ChildVersionId", "EpisodeId", "VariantId", "PromotionId", "MutationSummary", "ChangedFilesJson", "DiffPatch", "EvidenceArtifactId"]
hint = "Record a lineage edge between an organism parent and promoted child version."

[[action]]
name = "ArchiveLineageEdge"
kind = "input"
from = ["Recorded"]
to = "Archived"
params = ["Reason"]
hint = "Archive an erroneous lineage edge."

[[invariant]]
name = "ArchivedIsFinal"
when = ["Archived"]
assert = "no_further_transitions"
