[automaton]
name = "ViabilityConstraint"
states = ["Draft", "Pinned", "Active", "Archived"]
initial = "Draft"
allow_indefinite_states = ["Draft", "Pinned", "Active"]

[[action]]
name = "ActivateViabilityConstraint"
kind = "input"
from = ["Draft"]
to = "Active"
params = ["EpisodeId", "ConstraintStatement", "ConstraintKind", "CreatedByWorkerRunId"]
hint = "Activate a Viability Constraint."

[[action]]
name = "PinViabilityConstraint"
kind = "input"
from = ["Draft", "Active"]
to = "Pinned"
params = ["PinnedBy", "Reason"]
hint = "Pin an important Viability Constraint from chat or Mission Control."

[[action]]
name = "ArchiveViabilityConstraint"
kind = "input"
from = ["Draft", "Active", "Pinned"]
to = "Archived"
params = ["Reason"]
hint = "Archive a Viability Constraint."
