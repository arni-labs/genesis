[automaton]
name = "Trial"
states = ["Planned", "Running", "Succeeded", "Failed", "Archived"]
initial = "Planned"
allow_indefinite_states = ["Planned", "Running", "Succeeded", "Failed"]

[[state]]
name = "has_agent"
type = "bool"
initial = "false"

[[action]]
name = "StartTrial"
kind = "input"
from = ["Planned"]
to = "Running"
effect = "set has_agent true"
params = ["EpisodeId", "GenerationId", "VariantId", "EvaluationStageId", "StageResultId", "SimulatedUserPlanId", "SimulatedUserId", "PersonaJson", "RunIndex", "Goal", "WorkItemId"]
hint = "Start an AI simulated user trial against a variant."

[[action]]
name = "SucceedTrial"
kind = "input"
from = ["Running"]
to = "Succeeded"
params = ["Summary", "EvidenceArtifactId", "MeasurementsJson", "JourneyJson", "ObservationJson", "IntentSatisfied", "FrictionJson", "Blocker", "BlockerKind"]
hint = "Record a successful trial."

[[action]]
name = "FailTrial"
kind = "input"
from = ["Running"]
to = "Failed"
params = ["FailureReason", "EvidenceArtifactId", "MeasurementsJson", "JourneyJson", "ObservationJson", "IntentSatisfied", "FrictionJson", "Blocker", "BlockerKind"]
hint = "Record a failed trial."

[[action]]
name = "ArchiveTrial"
kind = "input"
from = ["Planned", "Succeeded", "Failed"]
to = "Archived"
params = ["Reason"]
hint = "Archive a trial."

[[invariant]]
name = "RunningHasAgent"
when = ["Running"]
assert = "is_true has_agent"
