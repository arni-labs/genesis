[automaton]
name = "EvidenceArtifact"
states = ["Recorded", "Linked", "Archived"]
initial = "Recorded"
allow_indefinite_states = ["Recorded", "Linked"]

[[action]]
name = "RecordEvidenceArtifact"
kind = "input"
from = ["Recorded"]
params = ["ArtifactKind", "Uri", "Summary", "CorrelationJson", "Digest"]
hint = "Record trace, log, screenshot, report, diff, metric sample, or other evidence."

[[action]]
name = "RecordEvidenceSummary"
kind = "input"
from = ["Recorded"]
params = ["ArtifactKind", "Uri", "Summary", "CorrelationJson", "Digest", "Query", "TimeWindow", "ResultCount", "Interpretation", "ZeroResultMeaning", "EvidenceProvenance"]
hint = "Record evidence plus the structured query/result summary used by evaluators."

[[action]]
name = "LinkEvidenceArtifact"
kind = "input"
from = ["Recorded", "Linked"]
to = "Linked"
params = ["TargetEntityType", "TargetEntityId"]
hint = "Link evidence to a Directed Evolution entity."

[[action]]
name = "ArchiveEvidenceArtifact"
kind = "input"
from = ["Recorded", "Linked"]
to = "Archived"
params = ["Reason"]
hint = "Archive evidence."
