[automaton]
name = "SelectionProtocol"
states = ["Draft", "Active", "Frozen", "Archived"]
initial = "Draft"
allow_indefinite_states = ["Draft", "Active", "Frozen"]

[[action]]
name = "ActivateSelectionProtocol"
kind = "input"
from = ["Draft"]
to = "Active"
params = ["EpisodeId", "SelectionStatement", "MetricIdsJson", "EliminationRuleIdsJson", "ScoringRuleIdsJson", "EvaluatorRef", "DecisionPolicy", "CreatedByWorkerRunId"]
hint = "Record the winner-selection protocol for an episode."

[[action]]
name = "FreezeSelectionProtocol"
kind = "input"
from = ["Active"]
to = "Frozen"
params = ["FrozenBy", "Reason"]
hint = "Freeze the selection protocol before variants run."

[[action]]
name = "ArchiveSelectionProtocol"
kind = "input"
from = ["Draft", "Active", "Frozen"]
to = "Archived"
params = ["Reason"]
hint = "Archive a selection protocol."
