[automaton]
name = "MetricDefinition"
states = ["Draft", "Active", "Archived"]
initial = "Draft"
allow_indefinite_states = ["Draft", "Active"]

[[action]]
name = "ActivateMetricDefinition"
kind = "input"
from = ["Draft"]
to = "Active"
params = ["MetricName", "MetricKind", "Unit", "HigherIsBetter", "Description"]
hint = "Activate a reusable metric definition."

[[action]]
name = "ActivateMetricDefinitionWithProvenance"
kind = "input"
from = ["Draft"]
to = "Active"
params = ["EpisodeId", "MetricName", "MetricKind", "Unit", "HigherIsBetter", "Description", "ProvenanceKind", "EvaluatorRef", "EvaluatorModule", "Interpretation", "HardConstraint"]
hint = "Activate an episode metric with explicit measurement provenance and evaluator metadata."

[[action]]
name = "ArchiveMetricDefinition"
kind = "input"
from = ["Draft", "Active"]
to = "Archived"
params = ["Reason"]
hint = "Archive a metric definition."
