[automaton]
name = "Signal"
states = ["Recorded", "Linked", "Ignored", "ObservationFailed", "Archived"]
initial = "Recorded"
allow_indefinite_states = ["Recorded", "Linked", "Ignored", "ObservationFailed"]

[[action]]
name = "RecordSignal"
kind = "input"
from = ["Recorded"]
effect = [{ type = "trigger", name = "signal_recorded" }]
params = ["Source", "SignalKind", "OrganismId", "Summary", "EvidenceArtifactId", "CorrelationJson"]
hint = "Record a raw observation before observer-worker interpretation."

[[action.triggers]]
name = "signal_recorded"
kind = "wasm"
module = "signal_observer"
on_failure = "FailSignalObservation"

[action.triggers.config]
temper_api_url = "{secret:temper_api_url}"

[[action]]
name = "LinkSignalToPressure"
kind = "input"
from = ["Recorded", "Linked"]
to = "Linked"
params = ["PressureId"]
hint = "Link this signal to an observer-interpreted pressure."

[[action]]
name = "FailSignalObservation"
kind = "input"
from = ["Recorded", "Linked"]
to = "ObservationFailed"
params = ["error", "error_message", "integration"]
hint = "Record that the observer worker failed before producing pressure."

[[action]]
name = "IgnoreSignal"
kind = "input"
from = ["Recorded", "Linked"]
to = "Ignored"
params = ["Reason"]
hint = "Mark a signal as not actionable."

[[action]]
name = "ArchiveSignal"
kind = "input"
from = ["Recorded", "Linked", "Ignored"]
to = "Archived"
params = ["Reason"]
hint = "Archive the signal."
