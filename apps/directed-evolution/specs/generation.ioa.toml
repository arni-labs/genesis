[automaton]
name = "Generation"
states = ["Planned", "Generating", "Evaluating", "Selecting", "Completed", "Failed"]
initial = "Planned"
allow_indefinite_states = ["Planned", "Generating", "Evaluating", "Selecting"]

[[state]]
name = "variant_count"
type = "counter"
initial = "0"

[[state]]
name = "survivor_count"
type = "counter"
initial = "0"

[[action]]
name = "StartGeneration"
kind = "input"
from = ["Planned"]
to = "Generating"
params = ["EpisodeId", "ParentVersionId", "GenerationIndex", "VariantTargetCount"]
hint = "Start generating variants for an episode."

[[action]]
name = "RecordGeneratedVariant"
kind = "input"
from = ["Generating", "Evaluating"]
to = "Evaluating"
effect = "increment variant_count"
params = ["VariantId", "WorkerRunId"]
hint = "Record a generated variant."

[[action]]
name = "RecordGenerationSurvivor"
kind = "input"
from = ["Evaluating"]
to = "Evaluating"
effect = "increment survivor_count"
params = ["VariantId"]
hint = "Record a variant that survived evaluation."

[[action]]
name = "BeginGenerationSelection"
kind = "input"
from = ["Evaluating"]
to = "Selecting"
params = ["Reason"]
hint = "Begin selection only after all generated variants are evaluated or eliminated."

[[action]]
name = "CompleteGeneration"
kind = "input"
from = ["Selecting"]
to = "Completed"
params = ["WinnerVariantId", "Summary"]
hint = "Complete this generation."

[[action]]
name = "FailGeneration"
kind = "input"
from = ["Planned", "Generating", "Evaluating", "Selecting"]
to = "Failed"
params = ["FailureReason"]
hint = "Fail this generation."
