[automaton]
name = "OrganismVersion"
states = ["Recorded", "Parent", "Superseded", "RolledBack"]
initial = "Recorded"
allow_indefinite_states = ["Recorded", "Parent", "Superseded"]

[[state]]
name = "is_parent"
type = "bool"
initial = "false"

[[action]]
name = "MarkOrganismVersionParent"
kind = "input"
from = ["Recorded", "Superseded"]
to = "Parent"
effect = "set is_parent true"
params = ["OrganismId", "AppRef", "CommitRef", "PromotionId", "Summary"]
hint = "Mark this organism version as the current parent."

[[action]]
name = "SupersedeOrganismVersion"
kind = "input"
from = ["Parent"]
to = "Superseded"
effect = "set is_parent false"
params = ["NewParentVersionId", "PromotionId"]
hint = "Supersede this parent with a newly promoted version."

[[action]]
name = "RollbackOrganismVersion"
kind = "input"
from = ["Parent", "Superseded"]
to = "RolledBack"
effect = "set is_parent false"
params = ["RollbackPromotionId", "Reason"]
hint = "Record that this version was rolled back."
