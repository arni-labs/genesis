[automaton]
name = "WorkItem"
states = ["Queued", "Claimed", "Running", "Succeeded", "Failed", "Cancelled"]
initial = "Queued"
allow_indefinite_states = ["Queued", "Claimed", "Running"]

[[state]]
name = "claimed"
type = "bool"
initial = "false"

[[state]]
name = "exclusive_key"
type = "string"
initial = ""

[[action]]
name = "QueueWorkItem"
kind = "input"
from = ["Queued"]
params = ["Role", "TargetEntityType", "TargetEntityId", "PromptRef", "ContextRef", "OutputSchemaRef", "CorrelationJson", "RequiredCapabilities", "Lane", "ExclusiveKey"]
hint = "Queue a runnable worker item with role, target, capability, lane, exclusive-key, and correlation context."

[[action]]
name = "ClaimWorkItem"
kind = "input"
from = ["Queued"]
to = "Claimed"
effect = "set claimed true"
params = ["WorkerId", "ClaimedBy"]
hint = "Claim a work item for local execution. Cedar and worker claim logic enforce worker identity and exclusive keys."

[[action]]
name = "StartWorkItem"
kind = "input"
from = ["Claimed"]
to = "Running"
guard = "is_true claimed"
params = ["WorkerRunId"]
hint = "Start a claimed work item and attach the WorkerRun execution attempt."

[[action]]
name = "SucceedWorkItem"
kind = "input"
from = ["Running"]
to = "Succeeded"
params = ["ResultJson", "EvidenceArtifactId", "Summary"]
hint = "Record successful work item completion. Domain apps react to this transition."

[[action]]
name = "FailWorkItem"
kind = "input"
from = ["Claimed", "Running"]
to = "Failed"
params = ["FailureReason", "EvidenceArtifactId"]
hint = "Record work item failure."

[[action]]
name = "CancelWorkItem"
kind = "input"
from = ["Queued", "Claimed"]
to = "Cancelled"
params = ["Reason"]
hint = "Cancel a work item before completion."
